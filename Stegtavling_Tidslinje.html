<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Walking Debt – Resan dag för dag</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Calibri, -apple-system, sans-serif;
    background: #FAF7F2;
    color: #1A1A1A;
    line-height: 1.5;
  }

  .header {
    background: #1F3D2B;
    color: white;
    padding: 16px 24px;
  }

  .header-title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .header-title p {
    font-size: 13px;
    color: #FAF7F2;
    opacity: 0.85;
    margin-top: 2px;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.15);
    margin-top: 14px;
  }

  .stat {
    background: #1F3D2B;
    padding: 10px 16px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    color: #EF7D00;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: white;
    margin-top: 2px;
    transition: color 0.3s;
  }

  #map {
    width: 100%;
    height: calc(100vh - 280px);
    min-height: 400px;
  }

  /* Timeline controls */
  .timeline {
    background: white;
    padding: 12px 24px 16px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .timeline-day {
    font-size: 18px;
    font-weight: 700;
    color: #1F3D2B;
  }

  .timeline-day span {
    color: #EF7D00;
  }

  .timeline-day-steps {
    font-size: 12px;
    color: #6B6B6B;
    margin-left: 8px;
    font-weight: normal;
  }

  .timeline-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .play-btn {
    background: #EF7D00;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: Calibri, sans-serif;
    transition: background 0.15s;
  }

  .play-btn:hover { background: #d66e00; }

  .reset-btn {
    background: #1F3D2B;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: Calibri, sans-serif;
    transition: opacity 0.15s;
  }

  .reset-btn:hover { opacity: 0.85; }

  .slider-row {
    position: relative;
    padding: 0 4px;
  }

  /* Slider styling */
  input[type="range"] {
    width: 100%;
    height: 8px;
    background: linear-gradient(to right, #1F3D2B 0%, #1F3D2B var(--progress, 0%), #E8E3D5 var(--progress, 0%), #E8E3D5 100%);
    border-radius: 4px;
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: #EF7D00;
    border: 3px solid white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: #EF7D00;
    border: 3px solid white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .day-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: #999;
  }

  /* Marker styles */
  .city-marker {
    background: white;
    border: 3px solid #1F3D2B;
    border-radius: 50%;
    width: 14px;
    height: 14px;
    display: block;
  }

  .city-marker.passed {
    background: #1F3D2B;
    border-color: #1F3D2B;
  }

  .city-marker.current {
    background: #EF7D00;
    border-color: #EF7D00;
    width: 20px;
    height: 20px;
    margin-left: -3px;
    margin-top: -3px;
    box-shadow: 0 0 0 4px rgba(239, 125, 0, 0.3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(239, 125, 0, 0.3); }
    50% { box-shadow: 0 0 0 10px rgba(239, 125, 0, 0.1); }
  }

  /* Popup */
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .leaflet-popup-content {
    margin: 14px 18px;
    font-family: Calibri, sans-serif;
    line-height: 1.5;
  }

  .popup-city {
    font-size: 15px;
    font-weight: 700;
    color: #1F3D2B;
    margin-bottom: 2px;
  }

  .popup-distance {
    font-size: 11px;
    color: #6B6B6B;
    margin-bottom: 8px;
  }

  .popup-steps {
    background: #FAF7F2;
    border-left: 3px solid #EF7D00;
    padding: 6px 10px;
    margin: 6px 0;
    font-size: 13px;
  }

  .popup-steps strong { color: #EF7D00; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <h1>The Walking Debt – Resan dag för dag</h1>
    <p>Dra reglaget eller tryck Spela för att se hur resan utvecklats</p>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Totalt efter denna dag</div>
      <div class="stat-value" id="stat-total">–</div>
    </div>
    <div class="stat">
      <div class="stat-label">Steg denna dag</div>
      <div class="stat-value" id="stat-daily">–</div>
    </div>
    <div class="stat">
      <div class="stat-label">Position</div>
      <div class="stat-value" id="stat-position">–</div>
    </div>
    <div class="stat">
      <div class="stat-label">Av total resa</div>
      <div class="stat-value" id="stat-percent">–</div>
    </div>
  </div>
</div>

<div id="map"></div>

<div class="timeline">
  <div class="timeline-header">
    <div class="timeline-day">
      Dag <span id="current-day">17</span>
      <span class="timeline-day-steps" id="current-day-info"></span>
    </div>
    <div class="timeline-controls">
      <button class="reset-btn" onclick="goToDay(0)">⏮ Början</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Spela upp</button>
      <button class="reset-btn" onclick="goToDay(17)">⏭ Slut</button>
    </div>
  </div>
  <div class="slider-row">
    <input type="range" id="daySlider" min="0" max="17" value="17" oninput="goToDay(this.value)">
    <div class="day-labels">
      <span>Start</span>
      <span>Dag 5</span>
      <span>Dag 10</span>
      <span>Dag 15</span>
      <span>Dag 17</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ============================================================
  // DAGLIGA STEG – LÄGG TILL NYA DAGAR HÄR
  // ============================================================
  const dailySteps = [
    153713, // Dag 1
    186176, // Dag 2
    145125, // Dag 3
    100078, // Dag 4
    110284, // Dag 5
    129417, // Dag 6
    117166, // Dag 7
    145510, // Dag 8
    180972, // Dag 9
    170157, // Dag 10
    141769, // Dag 11
    108171, // Dag 12
    119207, // Dag 13
    184829, // Dag 14
    173868, // Dag 15
    137830, // Dag 16
    143112, // Dag 17
    94743,  // Dag 18
    129249, // Dag 19

  ];
  // ============================================================

  // Build cumulative array: cumulative[i] = total steps after day i
  // cumulative[0] = 0 (start), cumulative[1] = day 1 only, etc
  const cumulative = [0];
  for (let i = 0; i < dailySteps.length; i++) {
    cumulative.push(cumulative[i] + dailySteps[i]);
  }

  const cities = [
    { name: "Stockholm", lat: 59.3327, lng: 18.0656, distance: 0, steps: 0 },
    { name: "Linköping", lat: 58.4108, lng: 15.6214, distance: 200, steps: 267000 },
    { name: "Jönköping", lat: 57.7826, lng: 14.1618, distance: 330, steps: 440000 },
    { name: "Malmö", lat: 55.6050, lng: 13.0038, distance: 660, steps: 880000 },
    { name: "Köpenhamn 🇩🇰", lat: 55.6761, lng: 12.5683, distance: 705, steps: 940000 },
    { name: "Hamburg 🇩🇪", lat: 53.5488, lng: 9.9872, distance: 1025, steps: 1367000 },
    { name: "Amsterdam 🇳🇱", lat: 52.3676, lng: 4.9041, distance: 1485, steps: 1980000 },
    { name: "Bryssel 🇧🇪", lat: 50.8477, lng: 4.3572, distance: 1695, steps: 2260000 },
    { name: "Paris 🇫🇷", lat: 48.8576, lng: 2.3514, distance: 2015, steps: 2687000 },
    { name: "Bordeaux", lat: 44.8416, lng: -0.5811, distance: 2595, steps: 3460000 },
    { name: "San Sebastián 🇪🇸", lat: 43.3182, lng: -1.9817, distance: 2835, steps: 3780000 },
    { name: "Bilbao", lat: 43.2634, lng: -2.9348, distance: 2935, steps: 3913000 },
    { name: "Madrid", lat: 40.4167, lng: -3.7033, distance: 3335, steps: 4447000 },
    { name: "Sevilla", lat: 37.3891, lng: -5.9845, distance: 3865, steps: 5153000 },
    { name: "Gibraltar 🇬🇮", lat: 36.1408, lng: -5.3536, distance: 4065, steps: 5420000 },
    { name: "Tanger 🇲🇦", lat: 35.7595, lng: -5.8340, distance: 4125, steps: 5500000 },
    { name: "Casablanca", lat: 33.5731, lng: -7.5898, distance: 4465, steps: 5953000 },
    { name: "Marrakech 🐪", lat: 31.6225, lng: -7.9898, distance: 4705, steps: 6273000 }
  ];

  const TOTAL_STEPS = cities[cities.length - 1].steps;
  const NUM_DAYS = dailySteps.length;

  // Update slider max to match number of days
  document.getElementById('daySlider').max = NUM_DAYS;
  document.getElementById('daySlider').value = NUM_DAYS;

  // Init map
  const map = L.map('map', {
    scrollWheelZoom: true,
    zoomControl: true
  }).setView([47, 5], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  function cleanName(name) {
    return name.replace(/[🇩🇰🇩🇪🇳🇱🇧🇪🇫🇷🇪🇸🇵🇹🇬🇮🇲🇦🐪]/gu, '').trim();
  }

  // Layers we redraw on each update
  let passedLine = null;
  let upcomingLine = null;
  let cityMarkers = [];
  let currentMarker = null;

  function clearLayers() {
    if (passedLine) map.removeLayer(passedLine);
    if (upcomingLine) map.removeLayer(upcomingLine);
    if (currentMarker) map.removeLayer(currentMarker);
    cityMarkers.forEach(m => map.removeLayer(m));
    cityMarkers = [];
  }

  function render(day) {
    const currentSteps = cumulative[day];

    clearLayers();

    // Find current segment
    let lastPassedIdx = 0;
    for (let i = 0; i < cities.length; i++) {
      if (cities[i].steps <= currentSteps) {
        lastPassedIdx = i;
      } else {
        break;
      }
    }

    // Geographic position
    let currentLat, currentLng, currentDistance;
    if (day === 0) {
      currentLat = cities[0].lat;
      currentLng = cities[0].lng;
      currentDistance = 0;
    } else if (lastPassedIdx < cities.length - 1) {
      const passed = cities[lastPassedIdx];
      const next = cities[lastPassedIdx + 1];
      const segmentSteps = next.steps - passed.steps;
      const stepsIntoSegment = currentSteps - passed.steps;
      const fraction = stepsIntoSegment / segmentSteps;
      currentLat = passed.lat + (next.lat - passed.lat) * fraction;
      currentLng = passed.lng + (next.lng - passed.lng) * fraction;
      currentDistance = passed.distance + (next.distance - passed.distance) * fraction;
    } else {
      currentLat = cities[cities.length - 1].lat;
      currentLng = cities[cities.length - 1].lng;
      currentDistance = cities[cities.length - 1].distance;
    }

    // Passed route - solid dark green
    const passedCoords = cities.slice(0, lastPassedIdx + 1).map(c => [c.lat, c.lng]);
    if (currentSteps > 0) passedCoords.push([currentLat, currentLng]);

    passedLine = L.polyline(passedCoords, {
      color: '#1F3D2B',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    // Upcoming - dashed orange
    const upcomingCoords = [[currentLat, currentLng]].concat(
      cities.slice(lastPassedIdx + 1).map(c => [c.lat, c.lng])
    );

    upcomingLine = L.polyline(upcomingCoords, {
      color: '#EF7D00',
      weight: 3,
      opacity: 0.7,
      dashArray: '10, 8'
    }).addTo(map);

    // City markers
    cities.forEach((city) => {
      const isPassed = city.steps <= currentSteps && currentSteps > 0;
      const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="city-marker ${isPassed ? 'passed' : ''}"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });

      const stepsDiff = city.steps > currentSteps
        ? (city.steps - currentSteps).toLocaleString('sv-SE') + ' steg kvar'
        : (currentSteps - city.steps).toLocaleString('sv-SE') + ' steg över';

      const popup = `
        <div class="popup-city">${city.name}</div>
        <div class="popup-distance">${city.distance.toLocaleString('sv-SE')} km från Stockholm</div>
        <div class="popup-steps">
          Mål: <strong>${city.steps.toLocaleString('sv-SE')} steg</strong>
          ${city.steps > 0 ? '<br><span style="font-size:11px; color:#6B6B6B;">' + stepsDiff + '</span>' : ''}
        </div>
      `;

      const marker = L.marker([city.lat, city.lng], { icon })
        .addTo(map)
        .bindPopup(popup);
      cityMarkers.push(marker);
    });

    // Current position marker (only if started)
    if (day > 0) {
      const currentIcon = L.divIcon({
        className: 'custom-marker',
        html: '<div class="city-marker current"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });

      currentMarker = L.marker([currentLat, currentLng], { icon: currentIcon, zIndexOffset: 1000 })
        .addTo(map);
    }

    // Build position text
    let positionText;
    if (day === 0) {
      positionText = "Stockholm (start)";
    } else if (currentSteps >= TOTAL_STEPS) {
      positionText = "🎉 Framme!";
    } else {
      const passed = cities[lastPassedIdx];
      const next = cities[lastPassedIdx + 1];
      const segmentSteps = next.steps - passed.steps;
      const fraction = (currentSteps - passed.steps) / segmentSteps;
      const passedName = cleanName(passed.name);
      const nextName = cleanName(next.name);

      if (fraction < 0.15) {
        positionText = `Just efter ${passedName}`;
      } else if (fraction > 0.85) {
        positionText = `Nästan i ${nextName}`;
      } else {
        positionText = `${passedName} → ${nextName}`;
      }
    }

    // Update stats
    const percent = Math.min(100, Math.round((currentSteps / TOTAL_STEPS) * 100));
    document.getElementById('stat-total').textContent = currentSteps.toLocaleString('sv-SE');
    document.getElementById('stat-daily').textContent = day > 0
      ? dailySteps[day - 1].toLocaleString('sv-SE')
      : '–';
    document.getElementById('stat-position').textContent = positionText;
    document.getElementById('stat-percent').textContent = percent + '%';

    // Day display
    document.getElementById('current-day').textContent = day;
    if (day === 0) {
      document.getElementById('current-day-info').textContent = '— Startpunkten';
    } else {
      const perPerson = Math.round(dailySteps[day - 1] / 15);
      document.getElementById('current-day-info').textContent =
        `— ${dailySteps[day - 1].toLocaleString('sv-SE')} steg (${perPerson.toLocaleString('sv-SE')} per person)`;
    }

    // Update slider progress visual
    const slider = document.getElementById('daySlider');
    const progress = (day / NUM_DAYS) * 100;
    slider.style.setProperty('--progress', progress + '%');
    slider.value = day;
  }

  function goToDay(day) {
    render(parseInt(day, 10));
  }

  // Play / pause animation
  let isPlaying = false;
  let playInterval = null;

  function togglePlay() {
    const btn = document.getElementById('playBtn');
    if (isPlaying) {
      clearInterval(playInterval);
      isPlaying = false;
      btn.textContent = '▶ Spela upp';
    } else {
      isPlaying = true;
      btn.textContent = '⏸ Pausa';
      let currentDay = parseInt(document.getElementById('daySlider').value, 10);
      if (currentDay >= NUM_DAYS) currentDay = 0;
      render(currentDay);

      playInterval = setInterval(() => {
        currentDay++;
        if (currentDay > NUM_DAYS) {
          clearInterval(playInterval);
          isPlaying = false;
          btn.textContent = '▶ Spela upp';
          return;
        }
        render(currentDay);
      }, 800);
    }
  }

  // Initial render - show final day
  render(NUM_DAYS);

  setTimeout(() => {
    const allCoords = cities.map(c => [c.lat, c.lng]);
    map.fitBounds(allCoords, { padding: [50, 50] });
  }, 100);
</script>

</body>
</html>
